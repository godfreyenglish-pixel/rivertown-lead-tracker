<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Post-Call Recap</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1a1a24;--border:#2a2a3a;--text:#e8e8f0;--text-dim:#8888a0;--accent:#f59e0b;--accent-dim:rgba(245,158,11,0.15);--green:#22c55e;--green-dim:rgba(34,197,94,0.15);--red:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.container{max-width:480px;margin:0 auto;padding:20px 16px 40px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.header-icon{width:40px;height:40px;background:var(--accent-dim);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.header h1{font-size:18px;font-weight:700}
.header p{font-size:13px;color:var(--text-dim);margin-top:2px}
.status-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:24px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-dim)}
.status-dot{width:8px;height:8px;border-radius:50%}
.status-dot.connected{background:var(--green);box-shadow:0 0 8px rgba(34,197,94,0.4)}
.status-dot.disconnected{background:var(--red)}
.status-dot.loading{background:var(--accent);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
label{display:block;font-size:13px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.lead-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.lead-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all 0.15s ease}
.lead-card:active{transform:scale(0.98)}
.lead-card.selected{border-color:var(--accent);background:var(--accent-dim)}
.lead-card .name{font-size:15px;font-weight:600;margin-bottom:4px}
.lead-card .meta{font-size:12px;color:var(--text-dim);display:flex;gap:12px}
.lead-card .status-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--surface2);color:var(--accent);text-transform:uppercase}
textarea{width:100%;min-height:140px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.5;resize:vertical;outline:none;margin-bottom:8px}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--text-dim)}
.hint{font-size:12px;color:var(--text-dim);margin-bottom:24px}
.btn{width:100%;padding:16px;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.15s ease}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:disabled{background:var(--surface2);color:var(--text-dim);cursor:not-allowed}
.btn-primary.sending{background:var(--surface2);color:var(--text-dim)}
.success-card{background:var(--green-dim);border:1px solid rgba(34,197,94,0.3);border-radius:10px;padding:20px;text-align:center;margin-bottom:20px;animation:slideUp 0.3s ease}
.success-card .icon{font-size:32px;margin-bottom:8px}
.success-card .title{font-size:16px;font-weight:700;color:var(--green)}
.success-card .subtitle{font-size:13px;color:var(--text-dim);margin-top:4px}
.btn-reset{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-dim)}
.empty-state .icon{font-size:32px;margin-bottom:12px}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.loading-spinner{display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px;color:var(--text-dim);font-size:14px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container" id="app">
<div class="header"><div class="header-icon">&#x1F4DE;</div><div><h1>Post-Call Recap</h1><p>Send a recap email after your discovery call</p></div></div>
<div class="status-bar" id="statusBar"><div class="status-dot loading" id="statusDot"></div><span id="statusText">Connecting...</span></div>
<div id="content"><div class="loading-spinner"><div class="spinner"></div>Loading leads...</div></div>
</div>
<script>
var scriptUrl = "https://script.google.com/macros/s/AKfycbzh3pRiZhDyVq8v--ERJIZ9DSJJmT10qryWqRZj7ie3nOD6zfSrtIwUfauZ7wMc57j6HA/exec";
var leads = [];
var selectedLeadId = null;

function jsonpCall(url) {
  return new Promise(function(resolve, reject) {
    var cb = "rt_" + Date.now() + "_" + Math.floor(Math.random() * 9999);
    var script = document.createElement("script");
    var timer = setTimeout(function() { cleanup(); reject(new Error("Request timed out.")); }, 20000);
    function cleanup() { clearTimeout(timer); delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); }
    window[cb] = function(data) { cleanup(); resolve(data); };
    script.onerror = function() { cleanup(); reject(new Error("Failed to reach Apps Script.")); };
    script.src = url + "&callback=" + cb;
    document.head.appendChild(script);
  });
}

function apiCall(action, data) {
  var u = scriptUrl + "?action=" + action;
  if (data) u += "&" + data;
  return jsonpCall(u);
}

function init() {
  apiCall("get").then(function(res) {
    if (res.success) {
      leads = (res.data || []).filter(function(l) {
        return l.status === "New" || l.status === "Contacted" || l.status === "Proposal Sent";
      }).sort(function(a, b) { return new Date(b.dateAdded) - new Date(a.dateAdded); });
      document.getElementById("statusDot").className = "status-dot connected";
      document.getElementById("statusText").textContent = leads.length + " active lead" + (leads.length !== 1 ? "s" : "");
      renderLeads();
    } else {
      showError();
    }
  }).catch(function() {
    showError();
  });
}

function showError() {
  document.getElementById("statusDot").className = "status-dot disconnected";
  document.getElementById("statusText").textContent = "Connection failed";
  document.getElementById("content").innerHTML = '<div class="empty-state"><div class="icon">&#x26A0;&#xFE0F;</div><p>Could not connect to your lead database.</p><p style="margin-top:8px;font-size:12px">Check your connection and refresh.</p></div>';
}

function renderLeads() {
  if (leads.length === 0) {
    document.getElementById("content").innerHTML = '<div class="empty-state"><div class="icon">&#x1F4ED;</div><p>No active leads to recap.</p></div>';
    return;
  }
  var h = '<label>Select Lead</label><div class="lead-grid">';
  for (var i = 0; i < leads.length; i++) {
    var l = leads[i];
    h += '<div class="lead-card" id="card-' + l.id + '" onclick="selectLead(\'' + l.id + '\')">';
    h += '<div class="name">' + esc(l.name || "Unknown") + '</div>';
    h += '<div class="meta"><span class="status-badge">' + esc(l.status) + '</span>';
    if (l.phone) h += '<span>' + esc(l.phone) + '</span>';
    h += '</div></div>';
  }
  h += '</div>';
  h += '<label>Call Notes</label>';
  h += '<textarea id="callNotes" placeholder="What did you cover? Their goals, concerns, what you recommended..."></textarea>';
  h += '<div class="hint">Keep it rough. Claude will polish it into a professional recap email.</div>';
  h += '<button class="btn btn-primary" id="sendBtn" onclick="sendRecap()" disabled>Select a lead first</button>';
  document.getElementById("content").innerHTML = h;
}

function selectLead(id) {
  selectedLeadId = id;
  var cards = document.querySelectorAll(".lead-card");
  for (var i = 0; i < cards.length; i++) cards[i].classList.remove("selected");
  document.getElementById("card-" + id).classList.add("selected");
  var btn = document.getElementById("sendBtn");
  btn.disabled = false;
  btn.textContent = "Send Recap Email";
}

function sendRecap() {
  var notes = document.getElementById("callNotes").value.trim();
  if (!selectedLeadId) return;
  if (!notes) {
    document.getElementById("callNotes").style.borderColor = "var(--red)";
    document.getElementById("callNotes").setAttribute("placeholder", "Please add your call notes before sending...");
    return;
  }
  var btn = document.getElementById("sendBtn");
  btn.disabled = true;
  btn.textContent = "Sending...";
  btn.className = "btn btn-primary sending";

  apiCall("recap", "id=" + encodeURIComponent(selectedLeadId) + "&notes=" + encodeURIComponent(notes)).then(function(res) {
    var lead = null;
    for (var i = 0; i < leads.length; i++) { if (leads[i].id === selectedLeadId) { lead = leads[i]; break; } }
    var firstName = (lead ? lead.name : "").split(" ")[0];
    document.getElementById("content").innerHTML = '<div class="success-card"><div class="icon">&#x2705;</div><div class="title">Recap Sent!</div><div class="subtitle">' + esc(firstName) + ' will get the email shortly</div></div><button class="btn btn-reset" onclick="reset()">Send Another Recap</button>';
  }).catch(function() {
    btn.disabled = false;
    btn.textContent = "Retry Send";
    btn.className = "btn btn-primary";
    document.getElementById("statusDot").className = "status-dot disconnected";
    document.getElementById("statusText").textContent = "Send failed. Try again.";
  });
}

function reset() {
  selectedLeadId = null;
  renderLeads();
  document.getElementById("statusDot").className = "status-dot connected";
  document.getElementById("statusText").textContent = leads.length + " active leads";
}

function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

init();
</script>
</body>
</html>
